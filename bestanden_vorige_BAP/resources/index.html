<main class="flex-1 px-4 sm:px-6 lg:px-8 py-8">

              <th class="px-6 py-4 text-left text-gray-600 dark:text-gray-300 text-xs font-medium uppercase tracking-wider">Label</th>

          <!-- Dynamic JSON-loaded rows -->

        </table>

      </div>
    </div>

</div>

<!-- Load Devices from JSON -->
<script>
async function loadDevices() {
    try {
        const response = await fetch("device_registry.json");
        const devices = await response.json();

        const tbody = document.getElementById("device-table-body");

        Object.values(devices).forEach((device, idx) => {
            const tr = document.createElement("tr");
            tr.className = "hover:bg-gray-50 dark:hover:bg-gray-900/30 transition-colors";

            tr.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900 dark:text-white font-mono">
                    ${idx + 1}
                </td>

                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white font-mono">
                    ${device.uuid}
                </td>

                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400 font-mono">
                    ${formatMac(device.mac_address)}
                </td>

                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                    ${device.device_type}
                </td>

                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                    ${device.label}
                </td>
            `;

            tbody.appendChild(tr);
        });

    } catch (err) {
        console.error("Failed to load devices.json:", err);
    }
}

function formatMac(value) {
    // Already a string → return directly
    if (typeof value === "string") return value.toUpperCase();

    // Integer → convert to 48-bit hex → format with colons
    const hex = value.toString(16).padStart(12, "0").toUpperCase();
    return hex.match(/.{1,2}/g).join(":");
}

// load data on page load
loadDevices();
</script>

</body>
