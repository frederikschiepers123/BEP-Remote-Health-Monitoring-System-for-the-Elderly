# Reference client connection settings for the aggregator's mTLS link to the
# tablet broker (CLAUDE.md §13.4 — single documented config, materialised from
# env by install.sh; values are read from RMMS_* env vars at runtime by the
# service, not from this file). Kept as documentation of the expected broker
# contract:
#
#   host            ${RMMS_BROKER_HOST}      (e.g. tablet.local)
#   port            ${RMMS_BROKER_PORT}      8883 (mTLS only; no plaintext)
#   cafile          ${RMMS_BROKER_CA_PATH}   project CA (PEM)
#   certfile        ${RMMS_BROKER_CERT_PATH} radxa client cert (PEM)
#   keyfile         ${RMMS_BROKER_KEY_PATH}  radxa private key (PEM)
#   tls_version     tlsv1.2+ , ECDSA P-256 (matches firmware §10.2)
#
# Broker ACL requirements (configured on the tablet, not here):
#   - radxa role may  read  rmms/+/+        (subscribe to every device subtree)
#   - radxa role may  write rmms/+/time/set (publish the wall-clock sync, §9.2.5)
